name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Unit tests + static analysis ─────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Vet
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' | xargs -I{} dirname {}); do
            echo "▶ vet: $mod"
            (cd "$mod" && go vet ./...)
          done

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' | xargs -I{} dirname {}); do
            echo "▶ staticcheck: $mod"
            (cd "$mod" && staticcheck ./...)
          done

      - name: Unit tests (race detector, count=3)
        run: make test-race

      - name: Coverage
        run: |
          for mod in $(find . -name go.mod -not -path './.git/*' | xargs -I{} dirname {}); do
            echo "▶ coverage: $mod"
            (cd "$mod" && go test -coverprofile=coverage.out -covermode=atomic ./... && \
              go tool cover -func=coverage.out | tail -1)
          done

  # ── Integration tests ─────────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache-dependency-path: "**/go.sum"

      - name: Integration tests (race detector)
        # make test-integration starts infra via its infra-up prerequisite.
        run: make test-integration

      - name: Stop infrastructure
        if: always()
        run: make infra-down
